name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/build-and-push.yml"
  schedule:
    # Rebuild weekly on Sundays to get latest packages
    - cron: "17 0 * * 0"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coders-compass/caddy-with-ratelimit

jobs:
  plugin-freshness-check:
    # Independent watchdog: surfaces it when the auto-update workflow has gone
    # silent (e.g. GitHub auto-disabled it for inactivity) or when the pinned
    # plugin SHA has drifted behind upstream master. Never fails the build —
    # uses ::warning::/::error:: annotations + step summary only.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare pinned plugin SHA against upstream master
        id: freshness
        run: |
          set -euo pipefail

          API_RESPONSE=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mholt/caddy-ratelimit/branches/master)
          UPSTREAM_SHA=$(echo "$API_RESPONSE" | jq -r '.commit.sha')

          if ! [[ "$UPSTREAM_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::warning::Could not fetch upstream master SHA (got: '$UPSTREAM_SHA'); skipping freshness check."
            echo "## Plugin Freshness Check" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Upstream SHA lookup failed — skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PINNED_SHA=$(grep -oP 'github\.com/mholt/caddy-ratelimit@\K[a-f0-9]{40}' Dockerfile)
          echo "Upstream master: $UPSTREAM_SHA"
          echo "Pinned in Dockerfile: $PINNED_SHA"

          {
            echo "## Plugin Freshness Check"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Pinned in Dockerfile | \`$PINNED_SHA\` |"
            echo "| Upstream master | \`$UPSTREAM_SHA\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PINNED_SHA" = "$UPSTREAM_SHA" ]; then
            echo "| Status | ✅ up to date |" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Plugin SHA is up to date."
          else
            COMPARE_URL="https://github.com/mholt/caddy-ratelimit/compare/${PINNED_SHA}...${UPSTREAM_SHA}"
            echo "| Status | ⚠️ behind upstream — [compare](${COMPARE_URL}) |" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Plugin pinned to ${PINNED_SHA} but upstream master is ${UPSTREAM_SHA}. See ${COMPARE_URL}. The dedicated update workflow opens the PR — this is just an early-warning."
          fi

      - name: Verify update workflow is not disabled
        run: |
          set -euo pipefail

          WORKFLOW_FILE="update-caddy-ratelimit-sha.yml"
          API_RESPONSE=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}")
          STATE=$(echo "$API_RESPONSE" | jq -r '.state')

          echo "Workflow ${WORKFLOW_FILE} state: ${STATE}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Update workflow state:** \`${STATE}\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATE" != "active" ]; then
            REMEDIATION="Re-enable via UI (Actions → Update Caddy Rate Limit Plugin SHA → Enable workflow) or 'gh workflow enable ${WORKFLOW_FILE}'."
            echo "::error::Auto-update workflow ${WORKFLOW_FILE} is in state '${STATE}' (expected 'active'). ${REMEDIATION}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **${REMEDIATION}**" >> "$GITHUB_STEP_SUMMARY"
            # Surface loudly but do not gate the build — the build itself is independent.
          fi

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        run: |
          docker build -t caddy-with-ratelimit:test .

      - name: Verify rate_limit module is loaded
        run: |
          docker run --rm caddy-with-ratelimit:test caddy list-modules | grep rate_limit
          echo "✓ Rate limit module verified"

      - name: Start test environment
        run: |
          cd test
          docker compose up -d
          
      - name: Wait for Caddy to be ready
        run: |
          echo "Waiting for Caddy to start..."
          max_attempts=30
          attempt=0
          while ! curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "200"; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "✗ Caddy did not become ready in time"
              docker compose -f test/docker-compose.yml logs
              exit 1
            fi
            sleep 1
          done
          echo "✓ Caddy is ready"

      - name: Run basic rate limiting tests
        run: |
          cd test
          chmod +x test.sh
          ./test.sh

      - name: Install oha for load testing
        run: |
          LATEST_OHA=$(curl -s https://api.github.com/repos/hatoo/oha/releases/latest | grep -oP '"tag_name": "\K(.*)(?=")')
          echo "Installing oha ${LATEST_OHA}"
          curl -L https://github.com/hatoo/oha/releases/download/${LATEST_OHA}/oha-linux-amd64 -o oha
          chmod +x oha
          sudo mv oha /usr/local/bin/
          oha --version

      - name: Run load tests with oha
        run: |
          cd test
          chmod +x load-test.sh
          ./load-test.sh

      - name: Show Caddy logs on failure
        if: failure()
        run: |
          docker compose -f test/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: |
          cd test
          docker compose down -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
