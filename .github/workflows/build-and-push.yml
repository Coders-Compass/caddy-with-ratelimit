name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/build-and-push.yml"
      - ".github/workflows/_test.yml"
      - "test/**"
  schedule:
    # Rebuild weekly on Sundays to get latest packages
    - cron: "17 0 * * 0"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coders-compass/caddy-with-ratelimit

jobs:
  plugin-freshness-check:
    # Independent watchdog: surfaces it when the auto-update workflow has gone
    # silent (e.g. GitHub auto-disabled it for inactivity) or when the pinned
    # plugin SHA has drifted behind upstream master. Never fails the build —
    # uses ::warning::/::error:: annotations + step summary only.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare pinned plugin SHA against upstream master
        id: freshness
        run: |
          set -euo pipefail

          API_RESPONSE=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mholt/caddy-ratelimit/branches/master)
          UPSTREAM_SHA=$(echo "$API_RESPONSE" | jq -r '.commit.sha')

          if ! [[ "$UPSTREAM_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::warning::Could not fetch upstream master SHA (got: '$UPSTREAM_SHA'); skipping freshness check."
            echo "## Plugin Freshness Check" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Upstream SHA lookup failed — skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PINNED_SHA=$(grep -oP 'github\.com/mholt/caddy-ratelimit@\K[a-f0-9]{40}' Dockerfile)
          echo "Upstream master: $UPSTREAM_SHA"
          echo "Pinned in Dockerfile: $PINNED_SHA"

          {
            echo "## Plugin Freshness Check"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Pinned in Dockerfile | \`$PINNED_SHA\` |"
            echo "| Upstream master | \`$UPSTREAM_SHA\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PINNED_SHA" = "$UPSTREAM_SHA" ]; then
            echo "| Status | ✅ up to date |" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Plugin SHA is up to date."
          else
            COMPARE_URL="https://github.com/mholt/caddy-ratelimit/compare/${PINNED_SHA}...${UPSTREAM_SHA}"
            echo "| Status | ⚠️ behind upstream — [compare](${COMPARE_URL}) |" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Plugin pinned to ${PINNED_SHA} but upstream master is ${UPSTREAM_SHA}. See ${COMPARE_URL}. The dedicated update workflow opens the PR — this is just an early-warning."
          fi

      - name: Verify update workflow is not disabled
        run: |
          set -euo pipefail

          WORKFLOW_FILE="update-caddy-ratelimit-sha.yml"
          API_RESPONSE=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}")
          STATE=$(echo "$API_RESPONSE" | jq -r '.state')

          echo "Workflow ${WORKFLOW_FILE} state: ${STATE}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Update workflow state:** \`${STATE}\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATE" != "active" ]; then
            REMEDIATION="Re-enable via UI (Actions → Update Caddy Rate Limit Plugin SHA → Enable workflow) or 'gh workflow enable ${WORKFLOW_FILE}'."
            echo "::error::Auto-update workflow ${WORKFLOW_FILE} is in state '${STATE}' (expected 'active'). ${REMEDIATION}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ **${REMEDIATION}**" >> "$GITHUB_STEP_SUMMARY"
            # Surface loudly but do not gate the build — the build itself is independent.
          fi

  test:
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write  # SARIF upload to GitHub Code Scanning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=schedule,pattern={{date 'YYYYMMDD'}}

      # Build amd64 image locally so Trivy can scan a concrete image before we
      # push to GHCR. The push step below reuses the BuildKit cache populated
      # here, so the marginal cost is the arm64 layers only.
      - name: Build image for vulnerability scan (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: caddy-with-ratelimit:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — table report (informational, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caddy-with-ratelimit:scan-target
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          output: trivy-table.txt
          exit-code: '0'
          trivyignores: .trivyignore

      - name: Trivy — SARIF for GitHub Code Scanning
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caddy-with-ratelimit:scan-target
          format: sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          output: trivy-results.sarif
          exit-code: '0'
          trivyignores: .trivyignore

      - name: Trivy — gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: caddy-with-ratelimit:scan-target
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: false
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Append Trivy report to job summary
        if: always()
        run: |
          if [ -f trivy-table.txt ] && [ -s trivy-table.txt ]; then
            {
              echo "## 🔒 Trivy image scan"
              echo ""
              echo '```'
              cat trivy-table.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🔒 Trivy image scan" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ No vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            trivy-table.txt
            trivy-results.sarif
          retention-days: 90
          if-no-files-found: warn

      # Multi-arch push. sbom + provenance attach SPDX SBOM and SLSA mode=max
      # provenance as OCI artifacts on the registry — visible via
      # `docker buildx imagetools inspect`.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
