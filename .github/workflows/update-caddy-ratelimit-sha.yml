name: Update Caddy Rate Limit Plugin SHA

on:
  schedule:
    - cron: "0 6 * * 0"
  # Non-schedule triggers keep the workflow from being auto-disabled by GitHub
  # for inactivity. The job is idempotent and exits in seconds when no update
  # is needed.
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest commit SHA from caddy-ratelimit
        id: get-sha
        run: |
          set -euo pipefail

          API_RESPONSE=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mholt/caddy-ratelimit/branches/master)
          LATEST_SHA=$(echo "$API_RESPONSE" | jq -r '.commit.sha')

          if ! [[ "$LATEST_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::error::Upstream SHA fetch returned a value that is not a 40-char hex SHA: '$LATEST_SHA'"
            echo "API response was: $API_RESPONSE"
            exit 1
          fi
          echo "Latest SHA: $LATEST_SHA"
          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

          CURRENT_SHA=$(grep -oP 'github\.com/mholt/caddy-ratelimit@\K[a-f0-9]{40}' Dockerfile)
          if ! [[ "$CURRENT_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::error::Could not extract a 40-char hex SHA from Dockerfile (got: '$CURRENT_SHA')"
            exit 1
          fi
          echo "Current SHA: $CURRENT_SHA"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

          if [ "$LATEST_SHA" = "$CURRENT_SHA" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "No update needed - already on latest commit"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $CURRENT_SHA -> $LATEST_SHA"
          fi

      - name: Get commit details
        if: steps.get-sha.outputs.needs_update == 'true'
        id: commit-details
        run: |
          set -euo pipefail

          COMMIT_INFO=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/mholt/caddy-ratelimit/commits/${{ steps.get-sha.outputs.latest_sha }})
          COMMIT_MESSAGE=$(echo "$COMMIT_INFO" | jq -r '.commit.message' | head -n 1)
          COMMIT_DATE=$(echo "$COMMIT_INFO" | jq -r '.commit.author.date')
          COMMIT_URL=$(echo "$COMMIT_INFO" | jq -r '.html_url')

          echo "commit_message=$COMMIT_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "commit_date=$COMMIT_DATE" >> "$GITHUB_OUTPUT"
          echo "commit_url=$COMMIT_URL" >> "$GITHUB_OUTPUT"

          echo "Commit Message: $COMMIT_MESSAGE"
          echo "Commit Date: $COMMIT_DATE"
          echo "Commit URL: $COMMIT_URL"

      - name: Update Dockerfile
        if: steps.get-sha.outputs.needs_update == 'true'
        run: |
          sed -i "s/github\.com\/mholt\/caddy-ratelimit@[a-f0-9]\{40\}/github.com\/mholt\/caddy-ratelimit@${{ steps.get-sha.outputs.latest_sha }}/g" Dockerfile

          echo "Updated Dockerfile with new SHA"
          git diff Dockerfile

      - name: Create Pull Request
        if: steps.get-sha.outputs.needs_update == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            Update caddy-ratelimit plugin to ${{ steps.get-sha.outputs.latest_sha }}

            Latest commit from mholt/caddy-ratelimit (master):
            - Message: ${{ steps.commit-details.outputs.commit_message }}
          branch: update-caddy-ratelimit-sha
          delete-branch: true
          title: "chore: update caddy-ratelimit plugin to latest commit"
          body: |
            ## 🔄 Automated Plugin Update

            This PR updates the `mholt/caddy-ratelimit` plugin to the latest commit.

            ### Changes
            - **Previous SHA**: `${{ steps.get-sha.outputs.current_sha }}`
            - **New SHA**: `${{ steps.get-sha.outputs.latest_sha }}`

            ### Latest Commit Details
            - **Message**: ${{ steps.commit-details.outputs.commit_message }}
            - **Date**: ${{ steps.commit-details.outputs.commit_date }}
            - **Link**: ${{ steps.commit-details.outputs.commit_url }}

            ### Commit History
            Compare changes: https://github.com/mholt/caddy-ratelimit/compare/${{ steps.get-sha.outputs.current_sha }}...${{ steps.get-sha.outputs.latest_sha }}

            ---

            🤖 This PR was automatically created by the `update-caddy-ratelimit-sha` workflow.

            Please review the changes in the upstream repository before merging.
          labels: |
            dependencies
            automated
            caddy-plugin
          assignees: ${{ github.repository_owner }}

      - name: Summary
        if: always()
        run: |
          set -euo pipefail

          NEEDS_UPDATE="${{ steps.get-sha.outputs.needs_update }}"
          CURRENT_SHA="${{ steps.get-sha.outputs.current_sha }}"
          LATEST_SHA="${{ steps.get-sha.outputs.latest_sha }}"
          PR_OPERATION="${{ steps.create-pr.outputs.pull-request-operation }}"
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          PR_URL="${{ steps.create-pr.outputs.pull-request-url }}"

          {
            echo "## Caddy Rate Limit Plugin SHA Check"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Current pinned SHA | \`${CURRENT_SHA:-unknown}\` |"
            echo "| Upstream master SHA | \`${LATEST_SHA:-unknown}\` |"
            echo "| Needs update | \`${NEEDS_UPDATE:-unknown}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$NEEDS_UPDATE" = "true" ]; then
            if [ -n "$PR_URL" ]; then
              echo "| PR | [#${PR_NUMBER}](${PR_URL}) (\`${PR_OPERATION}\`) |" >> "$GITHUB_STEP_SUMMARY"
              echo "✅ Update PR ${PR_OPERATION}: ${PR_URL}"
            else
              echo "| PR | ❌ NOT CREATED (operation: \`${PR_OPERATION:-none}\`) |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Update was needed (${CURRENT_SHA} -> ${LATEST_SHA}) but no PR was opened. peter-evans/create-pull-request reported operation='${PR_OPERATION:-none}'. Check repo setting 'Allow GitHub Actions to create and approve pull requests' (Settings → Actions → General → Workflow permissions)."
              exit 1
            fi
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ℹ️ Already on the latest commit — no PR needed." >> "$GITHUB_STEP_SUMMARY"
            echo "ℹ️ No update needed - already using latest commit ${CURRENT_SHA}"
          fi
